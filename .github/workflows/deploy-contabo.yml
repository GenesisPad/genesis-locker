name: Deploy to Contabo

# Deploys Genesis Locker (static frontend + API + indexer) to
# https://locker.genesispad.app on the shared Contabo host.
#
# SAFETY: this workflow is scoped strictly to genesis-locker. It only ever
# writes /var/www/genesis-locker, one Postgres role+database named
# genesis_locker, one pm2 process named genesis-locker-api, two cron entries
# (genesis-locker-indexer, genesis-locker-price-refresh), and one nginx
# server block for exactly locker.genesispad.app. It NEVER touches, greps,
# moves, or deletes any other project's files, databases, processes, or
# nginx configs.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'api/**'
      - '.github/workflows/deploy-contabo.yml'

concurrency:
  group: genesis-locker-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Optional: set this GitHub Actions secret to point the indexer at a
          # paid/private RPC provider. Falls back to the public Robinhood RPC
          # below when unset. This is the ONLY place the RPC URL should be
          # changed - editing it by hand on the server gets silently reverted
          # on the next deploy, since the env file is rewritten from scratch
          # every run.
          ROBINHOOD_RPC_URL: ${{ secrets.ROBINHOOD_RPC_URL }}
          WALLETCONNECT_PROJECT_ID: ${{ secrets.WALLETCONNECT_PROJECT_ID }}
          # Genesis launchpad V3 position lockers. Include historical lockers
          # so launch-created positions from previous corrected deployments
          # remain indexed and publicly verifiable.
          ROBINHOOD_V3_POSITION_LOCKER_ADDRESSES: ${{ secrets.ROBINHOOD_V3_POSITION_LOCKER_ADDRESSES || '0xC02d4b889281A40f0598c4bfB07B5bCccccC05C8,0x1B65A632200143Dd60a57B3f3639082555125F37,0x73Db4856b5CE50f9ad5A3C76C5170FE1E19F76F9' }}
          # Backward-compatible single-address secret. Prefer the plural list.
          ROBINHOOD_V3_POSITION_LOCKER_ADDRESS: ${{ secrets.ROBINHOOD_V3_POSITION_LOCKER_ADDRESS }}
          # Optional: Uniswap V2-compatible factory address on Robinhood Chain,
          # used to price plain token locks that never had their LP locked
          # here. Has a verified default in config.ts, override only if
          # GenesisPad ever changes its allowed DEX router/factory.
          ROBINHOOD_DEX_FACTORY_ADDRESS: ${{ secrets.ROBINHOOD_DEX_FACTORY_ADDRESS }}
          # Optional: GenesisPad's bonding-curve launcher, used to price a
          # token before it graduates to DEX liquidity. Has a verified
          # default in config.ts.
          ROBINHOOD_LAUNCHER_ADDRESS: ${{ secrets.ROBINHOOD_LAUNCHER_ADDRESS }}
          # Comma-separated named partner credentials, for example
          # dexscreener:<key>,dextools:<key>. The same secret may also be set
          # on Genesis Sentinel when a partner uses both products.
          PARTNER_API_KEYS: ${{ secrets.PARTNER_API_KEYS }}
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          port: ${{ secrets.CONTABO_PORT || '22' }}
          timeout: 30s
          command_timeout: 15m
          envs: ROBINHOOD_RPC_URL,WALLETCONNECT_PROJECT_ID,ROBINHOOD_V3_POSITION_LOCKER_ADDRESSES,ROBINHOOD_V3_POSITION_LOCKER_ADDRESS,ROBINHOOD_DEX_FACTORY_ADDRESS,ROBINHOOD_LAUNCHER_ADDRESS,PARTNER_API_KEYS
          script: |
            set -e

            APP_ROOT=/var/www/genesis-locker
            RELEASE_ROOT="$APP_ROOT/releases"
            SHARED_ROOT="$APP_ROOT/shared"
            RELEASE_ID="${{ github.sha }}"
            RELEASE_DIR="$RELEASE_ROOT/$RELEASE_ID"
            CURRENT_LINK="$APP_ROOT/current"
            DOMAIN="locker.genesispad.app"
            REPO_URL="https://github.com/GenesisPad/genesis-locker.git"
            API_ENV_FILE="$SHARED_ROOT/api.env"
            API_PORT=4010
            DB_NAME=genesis_locker
            DB_USER=genesis_locker

            mkdir -p "$RELEASE_ROOT" "$SHARED_ROOT"
            rm -rf "$RELEASE_DIR"
            git clone --depth 1 --branch main "$REPO_URL" "$RELEASE_DIR"

            # ── Provision Postgres (idempotent, scoped to our own role/db) ──
            # Reuse the existing password across redeploys by sourcing the real
            # env file (never regex it - a stray colon/slash easily corrupts a
            # connection string) and pulling the password out of the DATABASE_URL
            # that was actually written last time.
            DB_PASS=""
            if [ -f "$API_ENV_FILE" ]; then
              OLD_DATABASE_URL=$(grep '^DATABASE_URL=' "$API_ENV_FILE" | head -n1 | cut -d= -f2-)
              CANDIDATE=$(echo "$OLD_DATABASE_URL" | sed -E 's#^postgresql://[^:/]+:([^@/]+)@localhost:5432/genesis_locker$#\1#')
              # Only trust the extraction if it actually changed (i.e. the regex
              # matched a well-formed URL) and contains no URL-structure chars -
              # otherwise a previous corrupted file could poison this run too.
              if [ "$CANDIDATE" != "$OLD_DATABASE_URL" ] && ! echo "$CANDIDATE" | grep -q '[:/@]'; then
                DB_PASS="$CANDIDATE"
              fi
            fi
            if [ -z "$DB_PASS" ]; then
              DB_PASS=$(openssl rand -hex 16)
            fi
            sudo -u postgres psql -v ON_ERROR_STOP=1 <<SQL
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '$DB_USER') THEN
                CREATE ROLE $DB_USER LOGIN PASSWORD '$DB_PASS';
              ELSE
                ALTER ROLE $DB_USER WITH LOGIN PASSWORD '$DB_PASS';
              END IF;
            END
            \$\$;
            SELECT 'CREATE DATABASE $DB_NAME OWNER $DB_USER'
            WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '$DB_NAME')\gexec
            GRANT ALL PRIVILEGES ON DATABASE $DB_NAME TO $DB_USER;
            SQL

            # ── Persist the API env file (only the RPC/address values change
            #    across runs; the DB password is generated once and kept) ──
            UPLOADS_DIR="$SHARED_ROOT/uploads"
            mkdir -p "$UPLOADS_DIR"
            cat > "$API_ENV_FILE" <<ENVEOF
            NODE_ENV=production
            PORT=$API_PORT
            DATABASE_URL=postgresql://$DB_USER:$DB_PASS@localhost:5432/$DB_NAME
            ROBINHOOD_RPC_URL=${ROBINHOOD_RPC_URL:-https://rpc.mainnet.chain.robinhood.com}
            ROBINHOOD_LOCKER_ADDRESS=0x0372a1AE860CDc9357ac6bc8e9F97856b37B80Ed
            ROBINHOOD_V3_POSITION_LOCKER_ADDRESSES=${ROBINHOOD_V3_POSITION_LOCKER_ADDRESSES:-0xC02d4b889281A40f0598c4bfB07B5bCccccC05C8,0x1B65A632200143Dd60a57B3f3639082555125F37,0x73Db4856b5CE50f9ad5A3C76C5170FE1E19F76F9}
            ROBINHOOD_V3_POSITION_LOCKER_ADDRESS=${ROBINHOOD_V3_POSITION_LOCKER_ADDRESS:-}
            ROBINHOOD_DEX_FACTORY_ADDRESS=${ROBINHOOD_DEX_FACTORY_ADDRESS:-}
            ROBINHOOD_LAUNCHER_ADDRESS=${ROBINHOOD_LAUNCHER_ADDRESS:-}
            INDEXER_BATCH_SIZE=2000
            INDEXER_CONFIRMATIONS=12
            PARTNER_API_KEYS=${PARTNER_API_KEYS:-}
            PARTNER_RATE_LIMIT_MAX=600
            PARTNER_RATE_LIMIT_WINDOW_MS=60000
            PARTNER_CACHE_TTL_SECONDS=15
            UPLOADS_DIR=$UPLOADS_DIR
            ENVEOF
            chmod 600 "$API_ENV_FILE"
            ln -sfn "$API_ENV_FILE" "$RELEASE_DIR/api/.env"

            # ── Build + migrate the API ──────────────────────────────────────
            cd "$RELEASE_DIR/api"
            npm ci
            npm run build
            npx prisma generate
            npx prisma migrate deploy

            # ── Build the static frontend (same-origin API via nginx proxy) ─
            cd "$RELEASE_DIR/frontend"
            npm ci
            VITE_API_BASE_URL="https://$DOMAIN/api" \
            VITE_ROBINHOOD_RPC_URL="${ROBINHOOD_RPC_URL:-https://robinhood-mainnet.core.chainstack.com/2e476029d9bf0b19bfeb022628b339c2}" \
            VITE_WALLETCONNECT_PROJECT_ID="${WALLETCONNECT_PROJECT_ID:-d0f8a0df8b52c9cd980a7295ec15dfc2}" \
            npm run build
            test -f "$RELEASE_DIR/frontend/dist/index.html"

            # ── Activate this release ────────────────────────────────────────
            ln -sfn "$RELEASE_DIR" "$CURRENT_LINK"
            ls -1td "$RELEASE_ROOT"/*/ 2>/dev/null | tail -n +6 | xargs -r rm -rf

            # ── Run the API under pm2, scoped to our own process name ───────
            if command -v pm2 >/dev/null 2>&1; then
              pm2 delete genesis-locker-api >/dev/null 2>&1 || true
              pm2 start "$CURRENT_LINK/api/dist/server.js" --name genesis-locker-api --cwd "$CURRENT_LINK/api" --update-env
              pm2 save
            else
              pkill -f "$APP_ROOT/current/api/dist/server.js" 2>/dev/null || true
              cd "$CURRENT_LINK/api"
              set -a; . "$API_ENV_FILE"; set +a
              nohup node dist/server.js > "$SHARED_ROOT/api.log" 2>&1 &
            fi

            # Wait for the API to come up before wiring nginx to it.
            for i in $(seq 1 15); do
              if curl -fsS "http://127.0.0.1:$API_PORT/health" | grep -q '"ok":true'; then
                api_ready=1
                break
              fi
              sleep 2
            done
            if [ "${api_ready:-0}" != "1" ]; then
              echo "API failed to become healthy"
              command -v pm2 >/dev/null 2>&1 && pm2 logs genesis-locker-api --lines 80 --nostream
              exit 1
            fi

            # ── Seed chain config + do one indexer pass now ─────────────────
            cd "$CURRENT_LINK/api"
            set -a; . "$API_ENV_FILE"; set +a
            npm run seed
            npm run index || true
            # Keep V3 display rows canonical without running the full RPC-heavy
            # metadata/pricing backfill on every production deploy.
            npm run normalize-v3 || true

            # ── Cron the indexer + price refresh (idempotent: replace only our
            #    tagged lines) ────────────────────────────────────────────────
            INDEXER_TAG="genesis-locker-indexer"
            INDEXER_LINE="*/2 * * * * cd $CURRENT_LINK/api && /usr/bin/flock -n $SHARED_ROOT/indexer.lock /usr/bin/env bash -lc 'set -a; . $API_ENV_FILE; set +a; npm run index' >> $SHARED_ROOT/indexer.log 2>&1 # $INDEXER_TAG"
            # Refresh market prices and position values every five minutes so
            # lock values and aggregate TVL stay close to the live pools.
            PRICE_TAG="genesis-locker-price-refresh"
            PRICE_LINE="*/5 * * * * cd $CURRENT_LINK/api && /usr/bin/flock -n $SHARED_ROOT/price-refresh.lock /usr/bin/env bash -lc 'set -a; . $API_ENV_FILE; set +a; npm run refresh-prices' >> $SHARED_ROOT/price-refresh.log 2>&1 # $PRICE_TAG"
            CRON_FILE=$(mktemp)
            crontab -l 2>/dev/null | grep -v "$INDEXER_TAG" | grep -v "$PRICE_TAG" > "$CRON_FILE" || true
            printf '%s\n%s\n' "$INDEXER_LINE" "$PRICE_LINE" >> "$CRON_FILE"
            crontab "$CRON_FILE"
            rm -f "$CRON_FILE"

            # ── nginx: extend our own site file only (SPA + API proxy) ──────
            NGINX_SITE=/etc/nginx/sites-available/genesis-locker
            cat > "$NGINX_SITE" <<NGINX
            server {
              listen 80;
              listen [::]:80;
              server_name $DOMAIN;

              root $CURRENT_LINK/frontend/dist;
              index index.html;

              # Canonical public API. The trailing slash on proxy_pass rewrites
              # /api/v1/... to the API server's native /v1/... route.
              location /api/v1/ {
                proxy_pass http://127.0.0.1:$API_PORT/v1/;
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
              }

              location = /api/v1 {
                return 308 /api/v1/;
              }

              # Backward-compatible alias for existing clients.
              location /v1/ {
                proxy_pass http://127.0.0.1:$API_PORT;
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
              }

              location = /health {
                proxy_pass http://127.0.0.1:$API_PORT/health;
                proxy_set_header Host \$host;
              }

              # SPA fallback so client-side routes (/admin, /chains, …) resolve.
              location / {
                try_files \$uri \$uri/ /index.html;
              }

              location = /logo.png {
                try_files \$uri =404;
                access_log off;
                expires 7d;
              }
            }
            NGINX
            ln -sfn "$NGINX_SITE" /etc/nginx/sites-enabled/genesis-locker

            # Validate the whole nginx config; only reload if it passes so a
            # mistake here can never take down other sites.
            nginx -t
            systemctl reload nginx

            # ── TLS for our domain only (separate cert-name) ─────────────────
            if command -v certbot >/dev/null 2>&1; then
              certbot --nginx \
                --cert-name genesis-locker \
                -d "$DOMAIN" \
                --non-interactive \
                --agree-tos \
                --register-unsafely-without-email \
                --keep-until-expiring \
                --redirect || echo "certbot skipped/failed (DNS or rate limit) — HTTP site is live; re-run later"
            fi

            # ── Smoke test ────────────────────────────────────────────────────
            sleep 2
            curl -fsS --resolve "$DOMAIN:443:127.0.0.1" "https://$DOMAIN/" | grep -q "Genesis Locker"
            curl -fsS --resolve "$DOMAIN:443:127.0.0.1" "https://$DOMAIN/api/v1/chains" | grep -q "Robinhood Chain"
            curl -fsS --resolve "$DOMAIN:443:127.0.0.1" "https://$DOMAIN/v1/chains" | grep -q "Robinhood Chain"
            echo "Deployed $RELEASE_ID to https://$DOMAIN (frontend + API at /api/v1)"

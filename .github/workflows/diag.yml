name: Diagnostics (read-only)

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect server (no changes)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          port: ${{ secrets.CONTABO_PORT || '22' }}
          timeout: 30s
          command_timeout: 5m
          script: |
            echo "--- listening ports ---"
            ss -ltnp 2>/dev/null || netstat -ltnp 2>/dev/null
            echo "--- pm2 list ---"
            command -v pm2 >/dev/null && pm2 jlist 2>/dev/null | head -c 4000 || echo "no pm2"
            echo "--- postgres ---"
            command -v psql >/dev/null && echo "psql present" || echo "no psql"
            systemctl is-active postgresql 2>/dev/null || echo "postgresql not active/unknown"
            sudo -u postgres psql -c "\l" 2>/dev/null || echo "cannot list databases"
            sudo -u postgres psql -c "\du" 2>/dev/null || echo "cannot list roles"
            echo "--- nginx sites-enabled ---"
            ls -la /etc/nginx/sites-enabled/ 2>/dev/null
            echo "--- /var/www ---"
            ls -la /var/www/ 2>/dev/null
            echo "--- node/npm versions ---"
            node -v; npm -v
            echo "--- disk ---"
            df -h / 2>/dev/null
